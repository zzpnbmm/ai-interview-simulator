<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI面试模拟器 | 腾讯青科实训营</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #05070a;
    --card: rgba(12,18,32,0.9);
    --primary: #00d4aa;
    --primary-glow: rgba(0,212,170,0.35);
    --accent: #00a8ff;
    --accent-glow: rgba(0,168,255,0.35);
    --gold: #ffd700;
    --gold-glow: rgba(255,215,0,0.4);
    --text: #e8ecf1;
    --text-dim: #6b7a8f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ========== 全屏开场 ========== */
  #introScreen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    transition: opacity 1s, transform 1s;
  }
  #introScreen.done { opacity: 0; pointer-events: none; transform: scale(1.05); }
  .intro-year {
    font-size: 3.2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px; margin-bottom: 6px;
  }
  .intro-line {
    font-size: 1.05rem; color: var(--text-dim);
    line-height: 2.2; text-align: center;
    max-width: 520px; min-height: 2.2em;
  }
  .intro-line .cursor {
    display: inline-block; width: 2px; height: 1.1em;
    background: var(--primary); vertical-align: middle;
    animation: blink 0.8s step-end infinite; margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .intro-btn {
    margin-top: 36px; padding: 14px 48px;
    border: 1px solid var(--primary);
    background: transparent; color: var(--primary);
    border-radius: 40px; font-size: 1rem; font-weight: 600;
    cursor: pointer; letter-spacing: 4px;
    transition: all 0.4s; opacity: 0; transform: translateY(20px);
  }
  .intro-btn.show { opacity: 1; transform: translateY(0); }
  .intro-btn:hover {
    background: var(--primary); color: var(--bg);
    box-shadow: 0 0 30px var(--primary-glow);
  }
  /* 开场粒子雨 */
  .rain {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .rain-drop {
    position: absolute; width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(0,212,170,0.15), transparent);
    animation: rainFall linear infinite;
  }
  @keyframes rainFall {
    from { transform: translateY(-100%); }
    to { transform: translateY(100vh); }
  }

  /* ========== 主容器 ========== */
  .wrap {
    max-width: 680px; margin: 0 auto;
    padding: 20px 16px 40px;
    position: relative; z-index: 2;
    display: none;
  }
  .wrap.show { display: block; animation: fadeInUp 0.8s ease; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 顶部标题栏 */
  .topbar {
    text-align: center; padding: 16px 0 24px;
  }
  .topbar h1 {
    font-size: 1.6rem; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .topbar .sub {
    font-size: 0.78rem; color: var(--text-dim); margin-top: 6px; letter-spacing: 1px;
  }
  .chapter-tag {
    display: inline-block; border: 1px solid rgba(0,212,170,0.3);
    color: var(--primary); font-size: 0.7rem; padding: 3px 12px;
    border-radius: 20px; margin-bottom: 10px; letter-spacing: 2px;
  }

  /* ========== 场景卡片 ========== */
  .scene {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 16px;
    position: relative; overflow: hidden;
    backdrop-filter: blur(20px);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .scene::before {
    content: ''; position: absolute; inset: 0;
    border-radius: 20px; padding: 1px;
    background: linear-gradient(135deg, rgba(0,212,170,0.2), transparent 50%, rgba(0,168,255,0.15));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }
  .scene:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }

  /* 场景标题 */
  .scene-title {
    font-size: 0.9rem; font-weight: 600; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .scene-title .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 8px var(--primary-glow);
  }

  /* ========== 角色选择 ========== */
  .role-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .role-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px 12px;
    text-align: center; cursor: pointer;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    position: relative; overflow: hidden;
  }
  .role-card .emoji { font-size: 2.2rem; display: block; margin-bottom: 8px; transition: transform 0.3s; }
  .role-card .name { font-size: 0.85rem; font-weight: 600; }
  .role-card .desc { font-size: 0.68rem; color: var(--text-dim); margin-top: 4px; }
  .role-card:hover { border-color: rgba(0,212,170,0.3); transform: translateY(-4px) scale(1.02); }
  .role-card:hover .emoji { transform: scale(1.15); }
  .role-card.selected {
    border-color: var(--primary);
    background: rgba(0,212,170,0.08);
    box-shadow: 0 0 25px var(--primary-glow), inset 0 0 20px rgba(0,212,170,0.05);
    transform: scale(1.03);
  }
  .role-card.selected::after {
    content: '✓'; position: absolute; top: 8px; right: 10px;
    color: var(--primary); font-size: 0.9rem; font-weight: 700;
  }

  /* ========== 面试间 ========== */
  .interview-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .interview-top .left { font-weight: 600; font-size: 0.9rem; }
  .step-dots {
    display: flex; gap: 6px; align-items: center;
  }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: var(--text-dim);
    transition: all 0.4s;
  }
  .step-dot.done { border-color: var(--primary); background: rgba(0,212,170,0.15); color: var(--primary); }
  .step-dot.current {
    border-color: var(--accent); background: rgba(0,168,255,0.2);
    color: var(--accent);
    animation: pulseGlow 1.5s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 10px transparent; }
  }
  .step-line {
    width: 20px; height: 2px; background: rgba(255,255,255,0.08);
    border-radius: 1px; transition: background 0.4s;
  }
  .step-line.done { background: var(--primary); }

  .chat-box {
    background: rgba(6,10,18,0.8);
    border-radius: 16px;
    padding: 16px;
    min-height: 260px; max-height: 380px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 14px;
    margin: 14px 0;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .chat-box::-webkit-scrollbar { width: 3px; }
  .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

  .msg {
    display: flex; flex-direction: column;
    max-width: 88%;
    animation: msgIn 0.45s cubic-bezier(.34,1.56,.64,1);
  }
  .msg.ai { align-items: flex-start; }
  .msg.user { align-items: flex-end; align-self: flex-end; animation-name: msgInRight; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateX(-16px) scale(0.96); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes msgInRight {
    from { opacity: 0; transform: translateX(16px) scale(0.96); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  .msg-bubble {
    padding: 11px 16px; border-radius: 18px;
    font-size: 0.9rem; line-height: 1.6;
    word-break: break-word;
  }
  .msg.ai .msg-bubble {
    background: rgba(30,41,59,0.7);
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius: 3px;
    color: #e2e8f0;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--primary), #00a896);
    color: #000; font-weight: 500;
    border-bottom-right-radius: 3px;
  }
  .msg-feedback {
    font-size: 0.68rem; color: #4a5568; margin-top: 4px;
    padding-left: 10px; animation: fadeIn 0.5s 0.2s both;
  }
  .typing-cursor::after {
    content: '|'; animation: blink 0.8s step-end infinite;
    color: var(--primary); margin-left: 1px;
  }

  /* 思考动画 */
  .thinking-box {
    display: flex; gap: 4px; padding: 12px 16px;
    background: rgba(30,41,59,0.5);
    border-radius: 18px; border-bottom-left-radius: 3px;
    align-self: flex-start;
  }
  .thinking-box span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: bounceDot 1.2s ease-in-out infinite;
  }
  .thinking-box span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-box span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounceDot {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-7px); opacity: 1; }
  }

  /* 输入区 */
  .input-area {
    display: flex; gap: 10px;
  }
  .input-area input {
    flex: 1; padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; color: var(--text);
    font-size: 0.9rem; outline: none; font-family: inherit;
    transition: all 0.3s;
  }
  .input-area input::placeholder { color: #475569; }
  .input-area input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-glow);
    background: rgba(255,255,255,0.06);
  }
  .input-area input:disabled { opacity: 0.3; }

  .btn {
    padding: 12px 22px; border-radius: 14px;
    border: none; font-weight: 600; font-size: 0.88rem;
    cursor: pointer; transition: all 0.25s;
    font-family: inherit; letter-spacing: 1px;
    position: relative; overflow: hidden;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #00a896);
    color: #000;
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px var(--primary-glow); }
  .btn-primary:disabled { background: #1e293b; color: #475569; cursor: not-allowed; box-shadow: none; }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

  .start-wrap { text-align: center; margin-top: 14px; }
  .start-wrap .btn { padding: 13px 44px; font-size: 1rem; }
  .start-wrap .btn-pulse {
    animation: btnGlow 2.2s ease-in-out infinite;
  }
  @keyframes btnGlow {
    0%,100% { box-shadow: 0 0 15px var(--primary-glow); }
    50% { box-shadow: 0 0 35px var(--primary-glow); }
  }

  /* ========== 报告 ========== */
  #reportScene { display: none; }
  .score-ring-wrap {
    display: flex; justify-content: center; padding: 20px 0 10px;
  }
  .score-ring {
    width: 150px; height: 150px; border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
  }
  .score-ring::before {
    content: ''; position: absolute; inset: -5px;
    border-radius: 50%; padding: 5px;
    background: conic-gradient(var(--primary), var(--accent), #a78bfa, var(--primary));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: spinRing 5s linear infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .score-num { font-size: 2.8rem; font-weight: 800; line-height: 1; }
  .score-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }

  .dim-bars { padding: 0 4px; }
  .dim-item {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .dim-icon { font-size: 1.1rem; width: 24px; text-align: center; }
  .dim-name { font-size: 0.78rem; color: var(--text-dim); width: 64px; }
  .dim-track {
    flex: 1; height: 7px; background: rgba(255,255,255,0.05);
    border-radius: 4px; overflow: hidden;
  }
  .dim-fill {
    height: 100%; border-radius: 4px;
    width: 0; transition: width 1.4s cubic-bezier(.22,.61,.36,1);
  }
  .dim-fill.l { background: linear-gradient(90deg, var(--primary), #00a896); }
  .dim-fill.p { background: linear-gradient(90deg, var(--accent), #0066ff); }
  .dim-fill.a { background: linear-gradient(90deg, #a78bfa, #7c3aed); }
  .dim-fill.c { background: linear-gradient(90deg, var(--gold), #f59e0b); }
  .dim-val { font-size: 0.8rem; font-weight: 700; width: 32px; text-align: right; }

  .advice-box {
    background: rgba(255,255,255,0.03);
    border-radius: 14px; padding: 14px 16px;
    margin-top: 14px; font-size: 0.82rem;
    color: var(--text-dim); line-height: 1.7;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .action-btns {
    display: flex; gap: 10px; justify-content: center; margin-top: 18px;
  }

  /* 撒花 */
  .confetti {
    position: fixed; z-index: 9999; pointer-events: none;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* Toast */
  .toast {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,212,170,0.95); color: #000;
    padding: 10px 24px; border-radius: 40px;
    font-size: 0.82rem; font-weight: 600; z-index: 300;
    animation: toastIn 0.4s cubic-bezier(.34,1.56,.64,1), toastOut 0.3s 2s ease forwards;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-16px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes toastOut {
    to { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }

  footer {
    text-align: center; font-size: 0.65rem;
    color: #1e293b; padding: 20px 0;
    letter-spacing: 1px;
  }

  @media (max-width: 480px) {
    .intro-year { font-size: 2.4rem; }
    .role-grid { grid-template-columns: 1fr; }
    .topbar h1 { font-size: 1.3rem; }
    .score-num { font-size: 2.2rem; }
    .score-ring { width: 120px; height: 120px; }
  }
</style>
</head>
<body>

<!-- 粒子雨背景 -->
<div class="rain" id="rain"></div>

<!-- ========== 开场动画 ========== -->
<div id="introScreen">
  <div class="intro-year">公元2030年</div>
  <div class="intro-line" id="introLine"><span class="cursor"></span></div>
  <button class="intro-btn" id="introBtn" onclick="enterMain()">开启面试</button>
</div>

<!-- ========== 主内容 ========== -->
<div class="wrap" id="mainWrap">

  <div class="topbar">
    <div class="chapter-tag">第一章 · 启程</div>
    <h1>AI面试模拟器</h1>
    <div class="sub">腾讯青科实训营 · 未来HR挑战</div>
  </div>

  <!-- 角色选择 -->
  <div class="scene">
    <div class="scene-title"><div class="dot"></div>选择你的角色</div>
    <div class="role-grid" id="roleGrid">
      <div class="role-card" data-job="pm" onclick="selectRole(this,'pm')">
        <span class="emoji">📊</span>
        <div class="name">产品经理</div>
        <div class="desc">洞察需求 · 驱动迭代</div>
      </div>
      <div class="role-card" data-job="hr" onclick="selectRole(this,'hr')">
        <span class="emoji">👥</span>
        <div class="name">HR 专员</div>
        <div class="desc">识人育人 · 组织效能</div>
      </div>
      <div class="role-card" data-job="dev" onclick="selectRole(this,'dev')">
        <span class="emoji">💻</span>
        <div class="name">软件开发</div>
        <div class="desc">代码筑基 · 技术破局</div>
      </div>
    </div>
    <div id="roleHint" style="text-align:center; font-size:0.78rem; color:var(--text-dim); margin-top:12px;">
      点击上方角色，开始你的面试之旅
    </div>
  </div>

  <!-- 面试间 -->
  <div class="scene">
    <div class="interview-top">
      <div class="left">💬 面试间</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="step-dots" id="stepDots">
          <div class="step-dot" id="sd1">1</div>
          <div class="step-line" id="sl1"></div>
          <div class="step-dot" id="sd2">2</div>
          <div class="step-line" id="sl2"></div>
          <div class="step-dot" id="sd3">3</div>
        </div>
        <button class="btn btn-ghost" style="padding:6px 12px; font-size:0.75rem;" onclick="resetAll()">🔄 重置</button>
      </div>
    </div>
    <div class="chat-box" id="chatBox">
      <div class="msg ai">
        <div class="msg-bubble">👋 欢迎来到AI面试世界。请先在上方选择你的角色，然后点击「开启面试」，我将对你进行3轮专业考核。</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="answerInput" placeholder="输入你的回答..." autocomplete="off" disabled>
      <button class="btn btn-primary" id="sendBtn" disabled onclick="submitAnswer()">发送</button>
    </div>
    <div class="start-wrap">
      <button class="btn btn-primary btn-pulse" id="startBtn" onclick="startInterview()">🚀 开启面试</button>
    </div>
  </div>

  <!-- 报告 -->
  <div class="scene" id="reportScene">
    <div style="text-align:center; font-weight:700; font-size:1.1rem; margin-bottom:4px;">📈 面试报告</div>
    <div id="reportBody"></div>
    <div class="action-btns">
      <button class="btn btn-ghost" onclick="shareReport()">📸 分享卡片</button>
      <button class="btn btn-primary" onclick="resetAll()">🔄 重新面试</button>
    </div>
  </div>

  <footer>⚡ AI面试模拟器 · 动态评分 · 能力雷达图 · 沉浸式叙事</footer>
</div>

<script>
// ========== 粒子雨 ==========
(function(){
  const rain = document.getElementById('rain');
  for (let i=0;i<40;i++){
    const d = document.createElement('div');
    d.className = 'rain-drop';
    d.style.left = Math.random()*100+'%';
    d.style.height = (Math.random()*60+20)+'px';
    d.style.animationDuration = (Math.random()*1.5+0.8)+'s';
    d.style.animationDelay = Math.random()*2+'s';
    d.style.opacity = Math.random()*0.3+0.1;
    rain.appendChild(d);
  }
})();

// ========== 开场打字机 ==========
const introTexts = [
  "AI已全面重塑职场生态，",
  "字节跳动挥舞算法利刃，阿里筑起数据高墙，",
  "而你，正站在人生的十字路口——",
  "一份来自未来的面试邀请，",
  "已悄然抵达你的终端。"
];
let introIdx = 0, introChar = 0;
const introLine = document.getElementById('introLine');

function typeIntro() {
  if (introIdx >= introTexts.length) {
    document.getElementById('introBtn').classList.add('show');
    return;
  }
  const text = introTexts[introIdx];
  if (introChar < text.length) {
    introLine.childNodes[0].textContent += text[introChar];
    introChar++;
    setTimeout(typeIntro, 35 + Math.random()*25);
  } else {
    introLine.childNodes[0].textContent += '\n';
    introIdx++; introChar = 0;
    setTimeout(typeIntro, 500);
  }
}
// 启动开场
setTimeout(typeIntro, 600);

function enterMain() {
  document.getElementById('introScreen').classList.add('done');
  setTimeout(() => {
    document.getElementById('mainWrap').classList.add('show');
  }, 400);
}

// ========== Toast ==========
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

// ========== 撒花 ==========
function confetti() {
  const colors = ['#00d4aa','#00a8ff','#a78bfa','#ffd700','#f472b6','#60a5fa'];
  for (let i=0;i<70;i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100+'%';
    el.style.top = -(Math.random()*15+5)+'px';
    el.style.width = (Math.random()*8+4)+'px';
    el.style.height = (Math.random()*6+3)+'px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius = Math.random()>0.5?'50%':'2px';
    el.style.animationDuration = (Math.random()*2+2)+'s';
    el.style.animationDelay = Math.random()*0.6+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3200);
  }
}

// ========== 核心逻辑 ==========
const jobMap = {
  pm: { name:"产品经理", icon:"📊" },
  hr: { name:"HR专员", icon:"👥" },
  dev: { name:"软件开发工程师", icon:"💻" }
};
const questionBank = {
  pm: { questions: [
    "你最喜欢的一款互联网产品是什么？如果让你迭代一个功能，你会改哪里？",
    "假设开发资源严重不足，老板却要求两周上线新功能，你如何权衡需求优先级？",
    "用户反馈你的产品核心路径太复杂，转化率下降，你准备怎么分析并解决？"
  ]},
  hr: { questions: [
    "你认为未来HR最核心的能力是什么？请结合业务和AI说一下你的看法。",
    "假如部门负责人和一位高潜员工发生激烈冲突，你作为HRBP会怎么介入？",
    "如何用数据分析来提升新员工留存率？简单说说你的思路。"
  ]},
  dev: { questions: [
    "你最近在项目中遇到的最棘手的技术难题是什么？如何解决的？",
    "代码可读性和极致性能之间你怎么取舍？举例说明。",
    "如果产品经理提了一个需求，技术上实现成本极高但业务价值一般，你会怎么沟通？"
  ]}
};

let currentJob = null, currentStep = 0, questionsList = [];
let userAnswers = [], aiFeedbacks = [], scoresPerAnswer = [];
let dimensionScores = { logic:0, profession:0, adaptability:0, communication:0 };
let chartInstance = null;

const chatBox = document.getElementById('chatBox');
const answerInput = document.getElementById('answerInput');
const sendBtn = document.getElementById('sendBtn');
const startBtn = document.getElementById('startBtn');
const reportScene = document.getElementById('reportScene');
const roleHint = document.getElementById('roleHint');

// 打字机发消息
async function typeMsg(role, text, feedback=null) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  msg.appendChild(bubble);
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;

  if (role === 'ai' && text.length > 10) {
    for (let i = 0; i < text.length; i++) {
      bubble.textContent = text.slice(0, i+1);
      bubble.classList.add('typing-cursor');
      await new Promise(r => setTimeout(r, 18 + Math.random()*12));
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    bubble.classList.remove('typing-cursor');
  } else {
    bubble.textContent = text;
  }
  if (feedback) {
    const f = document.createElement('div');
    f.className = 'msg-feedback'; f.textContent = feedback;
    msg.appendChild(f);
  }
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'msg ai thinking';
  div.innerHTML = '<div class="thinking-box"><span></span><span></span><span></span></div>';
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}
function removeThinking(el) { if(el&&el.parentNode) el.parentNode.removeChild(el); }

function clearChat(welcome=true) {
  chatBox.innerHTML = '';
  if (welcome) {
    chatBox.innerHTML = '<div class="msg ai"><div class="msg-bubble">👋 欢迎来到AI面试世界。请先在上方选择你的角色，然后点击「开启面试」，我将对你进行3轮专业考核。</div></div>';
  }
}

function updateDots() {
  const ids = { sd1:'sd1',sd2:'sd2',sd3:'sd3',sl1:'sl1',sl2:'sl2' };
  ['sd1','sd2','sd3','sl1','sl2'].forEach(k => {
    const el = document.getElementById(ids[k]||k);
    el.className = el.className.replace(/\b(done|current)\b/g,'').trim();
  });
  if (currentStep >= 1) document.getElementById('sd1').classList.add('done');
  if (currentStep >= 2) { document.getElementById('sd2').classList.add('done'); document.getElementById('sl1').classList.add('done'); }
  if (currentStep >= 3) { document.getElementById('sd3').classList.add('done'); document.getElementById('sl2').classList.add('done'); }
  if (currentStep >= 1 && currentStep <= 3) {
    const cur = document.getElementById('sd'+currentStep);
    cur.classList.remove('done'); cur.classList.add('current');
  }
}

function selectRole(el, job) {
  if (currentStep > 0 && currentStep < 4) {
    if (!confirm('切换角色会中断当前面试，确定吗？')) return;
    resetAll();
  }
  currentJob = job;
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  roleHint.innerHTML = `<span style="color:var(--primary)">已选：${jobMap[job].icon} ${jobMap[job].name}</span>，点击「开启面试」开始考核`;
}

function simulateEval(jobKey, qIdx, ans) {
  let score = 60;
  const len = ans.trim().length;
  if (len > 100) score += 18;
  else if (len > 60) score += 12;
  else if (len > 30) score += 6;
  else if (len < 10) score -= 22;
  const kw = {
    pm: ['用户','数据','优先级','迭代','需求','mvp','转化','痛点','场景','体验'],
    hr: ['业务','沟通','共情','ai','数据','文化','冲突','人才','组织','战略'],
    dev: ['算法','性能','重构','测试','架构','debug','协作','扩展','维护','优化']
  };
  let mc = 0;
  (kw[jobKey]||[]).forEach(k => { if(ans.toLowerCase().includes(k.toLowerCase())) mc++; });
  score += Math.min(22, mc*4);
  score = Math.min(98, Math.max(28, Math.round(score)));
  let cmt = score>=88?"回答很出色，逻辑清晰有深度！":score>=75?"不错，抓住了要点，再丰富一下细节会更棒。":score>=60?"基本回答但缺乏亮点，建议结合具体案例。":"回答略显单薄，需要更结构化思考。";
  return {
    score,
    comment: cmt,
    dims: {
      logic: Math.min(98,Math.max(30,60+(score-60)*0.45+(Math.random()*8-4))),
      profession: Math.min(98,Math.max(30,60+(score-60)*0.5+(Math.random()*6-3))),
      adaptability: Math.min(98,Math.max(30,55+(score-55)*0.35+(Math.random()*10-5))),
      communication: Math.min(98,Math.max(30,65+(score-65)*0.3+(Math.random()*8-4)))
    }
  };
}

function animateNum(el, from, to, dur) {
  const t0 = performance.now();
  function tick(t) {
    const p = Math.min((t-t0)/dur, 1);
    const e = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(from + (to-from)*e);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

async function submitAnswer() {
  if (!currentJob) { await typeMsg('ai','请先选择一个角色再开始面试。'); return; }
  if (currentStep < 1 || currentStep > questionsList.length) return;
  const ans = answerInput.value.trim();
  if (!ans) { await typeMsg('ai','🤔 请写一点回答再提交吧，简短也可以～'); return; }
  userAnswers.push(ans);
  await typeMsg('user', ans);
  answerInput.value = '';
  sendBtn.disabled = true; answerInput.disabled = true;

  const th = showThinking();
  await new Promise(r => setTimeout(r, 1000+Math.random()*500));
  removeThinking(th);

  const qIdx = currentStep - 1;
  const ev = simulateEval(currentJob, qIdx, ans);
  scoresPerAnswer.push(ev.score);
  dimensionScores.logic += ev.dims.logic;
  dimensionScores.profession += ev.dims.profession;
  dimensionScores.adaptability += ev.dims.adaptability;
  dimensionScores.communication += ev.dims.communication;

  const fb = `📝 点评：${ev.comment} (本题得分 ${ev.score})`;
  aiFeedbacks.push(fb);
  await typeMsg('ai', `第${currentStep}题回答完毕。${fb}`);

  if (currentStep === questionsList.length) {
    currentStep = 4;
    sendBtn.disabled = true; answerInput.disabled = true;
    updateDots();
    generateReport();
  } else {
    currentStep++;
    updateDots();
    await typeMsg('ai', `🗣️ 第${currentStep}题：${questionsList[currentStep-1]}`);
    sendBtn.disabled = false; answerInput.disabled = false;
    answerInput.focus();
  }
}

function generateReport() {
  const avgL = dimensionScores.logic/3, avgP = dimensionScores.profession/3;
  const avgA = dimensionScores.adaptability/3, avgC = dimensionScores.communication/3;
  const total = Math.round(scoresPerAnswer.reduce((a,b)=>a+b,0)/scoresPerAnswer.length);

  reportScene.style.display = 'block';
  document.getElementById('reportBody').innerHTML = `
    <div class="score-ring-wrap">
      <div class="score-ring">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label">${jobMap[currentJob].icon} ${jobMap[currentJob].name}</div>
      </div>
    </div>
    <div style="text-align:center; font-size:0.8rem; color:var(--text-dim); margin-bottom:14px;">
      ${total>=80?'🌟 表现优秀，有潜力！':total>=65?'👍 不错，继续提升~':'📚 再加强实战与思考'}
    </div>
    <div style="max-width:300px; margin:0 auto 14px;">
      <canvas id="radarCanvas" style="width:100%; height:auto; display:block;"></canvas>
    </div>
    <div class="dim-bars">
      <div class="dim-item"><span class="dim-icon">🧠</span><span class="dim-name">逻辑表达</span><div class="dim-track"><div class="dim-fill l" id="bf-l"></div></div><span class="dim-val" id="bv-l">0</span></div>
      <div class="dim-item"><span class="dim-icon">🎯</span><span class="dim-name">专业匹配</span><div class="dim-track"><div class="dim-fill p" id="bf-p"></div></div><span class="dim-val" id="bv-p">0</span></div>
      <div class="dim-item"><span class="dim-icon">⚡</span><span class="dim-name">应变能力</span><div class="dim-track"><div class="dim-fill a" id="bf-a"></div></div><span class="dim-val" id="bv-a">0</span></div>
      <div class="dim-item"><span class="dim-icon">🗣️</span><span class="dim-name">沟通技巧</span><div class="dim-track"><div class="dim-fill c" id="bf-c"></div></div><span class="dim-val" id="bv-c">0</span></div>
    </div>
    <div class="advice-box">
      💡 面试官建议：${total>=80?'多做实战项目，拓展行业视野。':total>=65?'回答时多引用STAR法则，量化成果。':'先梳理岗位核心能力，用真实案例打磨表达。'}
    </div>
  `;
  reportScene.scrollIntoView({ behavior:'smooth' });

  setTimeout(() => { const el = document.getElementById('scoreNum'); if(el) animateNum(el,0,total,1500); }, 200);
  setTimeout(() => {
    const map = { l:avgL, p:avgP, a:avgA, c:avgC };
    Object.keys(map).forEach(k => {
      const v = Math.round(map[k]);
      const bar = document.getElementById('bf-'+k);
      const val = document.getElementById('bv-'+k);
      if(bar) bar.style.width = v+'%';
      if(val) animateNum(val,0,v,1200);
    });
  }, 400);

  setTimeout(() => {
    const ctx = document.getElementById('radarCanvas')?.getContext('2d');
    if(!ctx) return;
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['逻辑表达','专业匹配','应变能力','沟通技巧'],
        datasets: [{
          label: '你的能力值',
          data: [avgL,avgP,avgA,avgC],
          backgroundColor: 'rgba(0,212,170,0.12)',
          borderColor: '#00d4aa',
          borderWidth: 2,
          pointBackgroundColor: '#00d4aa',
          pointBorderColor: '#05070a',
          pointBorderWidth: 2,
          pointRadius: 5,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        animation: { duration: 1400, easing: 'easeOutQuart' },
        scales: {
          r: {
            beginAtZero: true, max: 100, ticks: { stepSize: 20, color: '#475569', backdropColor: 'transparent', font:{size:9} },
            grid: { color: 'rgba(255,255,255,0.05)' },
            angleLines: { color: 'rgba(255,255,255,0.05)' },
            pointLabels: { color: '#64748b', font:{size:11} }
          }
        },
        plugins: { legend: { labels: { color: '#475569', font:{size:10} } } }
      }
    });
  }, 500);

  if (total >= 75) setTimeout(confetti, 700);
  toast('✨ 面试报告生成完毕！');
}

async function startInterview() {
  if (!currentJob) { await typeMsg('ai','⚠️ 请先选择你的角色~'); return; }
  if (currentStep === 4) resetAll();
  if (currentStep > 0 && currentStep <= 3) { await typeMsg('ai','⏳ 面试已在进行中，请继续回答。'); return; }
  clearChat(false);
  currentStep = 1;
  userAnswers=[]; aiFeedbacks=[]; scoresPerAnswer=[];
  dimensionScores = { logic:0, profession:0, adaptability:0, communication:0 };
  questionsList = [...questionBank[currentJob].questions];
  updateDots();
  await typeMsg('ai', `🎤 欢迎参加${jobMap[currentJob].icon} ${jobMap[currentJob].name}岗位模拟面试，我将提问3个问题，请认真思考后回答。`);
  setTimeout(async () => {
    await typeMsg('ai', `第1题：${questionsList[0]}`);
  }, 600);
  sendBtn.disabled = false; answerInput.disabled = false;
  answerInput.focus();
  reportScene.style.display = 'none';
}

function resetAll() {
  currentStep = 0; currentJob = null;
  sendBtn.disabled = true; answerInput.disabled = true;
  clearChat(true); updateDots();
  reportScene.style.display = 'none';
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  roleHint.textContent = '点击上方角色，开始你的面试之旅';
  startBtn.style.display = 'inline-block';
}

answerInput.addEventListener('keypress', e => {
  if (e.key === 'Enter' && !sendBtn.disabled && !answerInput.disabled) submitAnswer();
});

async function shareReport() {
  const el = document.getElementById('reportBody');
  if (!el) return;
  try {
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#0c1020' });
    const a = document.createElement('a');
    a.download = `面试报告_${jobMap[currentJob]?.name||'AI'}.png`;
    a.href = canvas.toDataURL(); a.click();
    toast('📸 截图已保存！');
  } catch(e) { alert('截图生成失败'); }
}
</script>
