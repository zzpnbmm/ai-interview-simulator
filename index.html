<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI面试模拟器 | 腾讯青科实训营</title>
<style>
  :root {
    --bg: #05070a;
    --card: rgba(12,18,32,0.9);
    --primary: #00d4aa;
    --primary-glow: rgba(0,212,170,0.35);
    --accent: #00a8ff;
    --accent-glow: rgba(0,168,255,0.35);
    --gold: #ffd700;
    --gold-glow: rgba(255,215,0,0.4);
    --text: #e8ecf1;
    --text-dim: #6b7a8f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ========== 全屏开场 ========== */
  #introScreen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    transition: opacity 1s, transform 1s;
  }
  #introScreen.done { opacity: 0; pointer-events: none; transform: scale(1.05); }
  .intro-year {
    font-size: 3.2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px; margin-bottom: 6px;
  }
  .intro-line {
    font-size: 1.05rem; color: var(--text-dim);
    line-height: 2.2; text-align: center;
    max-width: 580px;
    white-space: pre-line;
  }
  .intro-line.typing::after {
    content: ''; display: inline-block; width: 2px; height: 1.1em;
    background: var(--primary); vertical-align: middle;
    animation: blink 0.8s step-end infinite; margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .intro-btn {
    margin-top: 36px; padding: 14px 48px;
    border: 1px solid var(--primary);
    background: transparent; color: var(--primary);
    border-radius: 40px; font-size: 1rem; font-weight: 600;
    cursor: pointer; letter-spacing: 4px;
    transition: all 0.4s; opacity: 0; transform: translateY(20px);
  }
  .intro-btn.show { opacity: 1; transform: translateY(0); }
  .intro-btn:hover {
    background: var(--primary); color: var(--bg);
    box-shadow: 0 0 30px var(--primary-glow);
  }
  /* 开场粒子雨 */
  .rain {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .rain-drop {
    position: absolute; width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(0,212,170,0.15), transparent);
    animation: rainFall linear infinite;
  }
  @keyframes rainFall {
    from { transform: translateY(-100%); }
    to { transform: translateY(100vh); }
  }

  /* ========== 主容器 ========== */
  .wrap {
    max-width: 680px; margin: 0 auto;
    padding: 20px 16px 40px;
    position: relative; z-index: 2;
    display: none;
  }
  .wrap.show { display: block; animation: fadeInUp 0.8s ease; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 顶部标题栏 */
  .topbar {
    text-align: center; padding: 16px 0 24px;
  }
  .topbar h1 {
    font-size: 1.6rem; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .topbar .sub {
    font-size: 0.78rem; color: var(--text-dim); margin-top: 6px; letter-spacing: 1px;
  }
  .chapter-tag {
    display: inline-block; border: 1px solid rgba(0,212,170,0.3);
    color: var(--primary); font-size: 0.7rem; padding: 3px 12px;
    border-radius: 20px; margin-bottom: 10px; letter-spacing: 2px;
  }

  /* ========== 场景卡片 ========== */
  .scene {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 16px;
    position: relative; overflow: hidden;
    backdrop-filter: blur(20px);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .scene::before {
    content: ''; position: absolute; inset: 0;
    border-radius: 20px; padding: 1px;
    background: linear-gradient(135deg, rgba(0,212,170,0.2), transparent 50%, rgba(0,168,255,0.15));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }
  .scene:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }

  /* 场景标题 */
  .scene-title {
    font-size: 0.9rem; font-weight: 600; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .scene-title .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 8px var(--primary-glow);
  }

  /* ========== 角色选择 ========== */
  .role-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .role-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px 12px;
    text-align: center; cursor: pointer;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    position: relative; overflow: hidden;
  }
  .role-card .emoji { font-size: 2.2rem; display: block; margin-bottom: 8px; transition: transform 0.3s; }
  .role-card .name { font-size: 0.85rem; font-weight: 600; }
  .role-card .desc { font-size: 0.68rem; color: var(--text-dim); margin-top: 4px; }
  .role-card:hover { border-color: rgba(0,212,170,0.3); transform: translateY(-4px) scale(1.02); }
  .role-card:hover .emoji { transform: scale(1.15); }
  .role-card.selected {
    border-color: var(--primary);
    background: rgba(0,212,170,0.08);
    box-shadow: 0 0 25px var(--primary-glow), inset 0 0 20px rgba(0,212,170,0.05);
    transform: scale(1.03);
  }
  .role-card.selected::after {
    content: '✓'; position: absolute; top: 8px; right: 10px;
    color: var(--primary); font-size: 0.9rem; font-weight: 700;
  }

  /* ========== 面试间 ========== */
  .interview-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .interview-top .left { font-weight: 600; font-size: 0.9rem; }
  .step-dots {
    display: flex; gap: 6px; align-items: center;
  }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: var(--text-dim);
    transition: all 0.4s;
  }
  .step-dot.done { border-color: var(--primary); background: rgba(0,212,170,0.15); color: var(--primary); }
  .step-dot.current {
    border-color: var(--accent); background: rgba(0,168,255,0.2);
    color: var(--accent);
    animation: pulseGlow 1.5s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 10px transparent; }
  }
  .step-line {
    width: 20px; height: 2px; background: rgba(255,255,255,0.08);
    border-radius: 1px; transition: background 0.4s;
  }
  .step-line.done { background: var(--primary); }

  .chat-box {
    background: rgba(6,10,18,0.8);
    border-radius: 16px;
    padding: 16px;
    min-height: 260px; max-height: 380px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 14px;
    margin: 14px 0;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .chat-box::-webkit-scrollbar { width: 3px; }
  .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

  .msg {
    display: flex; flex-direction: column;
    max-width: 88%;
    animation: msgIn 0.45s cubic-bezier(.34,1.56,.64,1);
  }
  .msg.ai { align-items: flex-start; }
  .msg.user { align-items: flex-end; align-self: flex-end; animation-name: msgInRight; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateX(-16px) scale(0.96); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes msgInRight {
    from { opacity: 0; transform: translateX(16px) scale(0.96); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  .msg-bubble {
    padding: 11px 16px; border-radius: 18px;
    font-size: 0.9rem; line-height: 1.6;
    word-break: break-word;
  }
  .msg.ai .msg-bubble {
    background: rgba(30,41,59,0.7);
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius: 3px;
    color: #e2e8f0;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--primary), #00a896);
    color: #000; font-weight: 500;
    border-bottom-right-radius: 3px;
  }
  .msg-feedback {
    font-size: 0.68rem; color: #4a5568; margin-top: 4px;
    padding-left: 10px; animation: fadeIn 0.5s 0.2s both;
  }
  .typing-cursor::after {
    content: '|'; animation: blink 0.8s step-end infinite;
    color: var(--primary); margin-left: 1px;
  }

  /* 思考动画 */
  .thinking-box {
    display: flex; gap: 4px; padding: 12px 16px;
    background: rgba(30,41,59,0.5);
    border-radius: 18px; border-bottom-left-radius: 3px;
    align-self: flex-start;
  }
  .thinking-box span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: bounceDot 1.2s ease-in-out infinite;
  }
  .thinking-box span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-box span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounceDot {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-7px); opacity: 1; }
  }

  /* 面试官点评卡片 */
  .feedback-card {
    align-self: flex-start;
    max-width: 92%;
    background: linear-gradient(135deg, rgba(0,212,170,0.08), rgba(0,168,255,0.05));
    border: 1px solid rgba(0,212,170,0.18);
    border-radius: 16px;
    padding: 14px 16px;
    margin: 4px 0 10px 0;
    animation: msgIn 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .feedback-card.c-grade { border-color: rgba(255,90,90,0.25); background: linear-gradient(135deg, rgba(255,90,90,0.08), rgba(255,150,50,0.04)); }
  .feedback-card.b-grade { border-color: rgba(255,200,50,0.2); background: linear-gradient(135deg, rgba(255,200,50,0.06), rgba(255,150,30,0.03)); }
  .feedback-card.a-grade { border-color: rgba(0,168,255,0.2); background: linear-gradient(135deg, rgba(0,168,255,0.08), rgba(0,120,255,0.04)); }
  .feedback-card.s-grade { border-color: rgba(0,212,170,0.22); }
  .feedback-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .feedback-badge { font-size:1.1rem; font-weight:800; width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:10px; flex-shrink:0; }
  .feedback-badge.s { background:rgba(0,212,170,0.18); color:var(--primary); }
  .feedback-badge.a { background:rgba(0,168,255,0.18); color:var(--accent); }
  .feedback-badge.b { background:rgba(255,200,50,0.14); color:#ffd700; }
  .feedback-badge.c { background:rgba(255,90,90,0.14); color:#ff5a5a; }
  .feedback-title { font-size:0.95rem; font-weight:600; }
  .feedback-sub { font-size:0.75rem; color:var(--text-dim); margin-top:2px; }
  .feedback-section { margin-top:10px; }
  .feedback-section-title { font-size:0.78rem; font-weight:600; margin-bottom:5px; display:flex; align-items:center; gap:5px; }
  .feedback-card.s-grade .feedback-section-title { color:var(--primary); }
  .feedback-card.a-grade .feedback-section-title { color:var(--accent); }
  .feedback-card.b-grade .feedback-section-title { color:#ffd700; }
  .feedback-card.c-grade .feedback-section-title { color:#ff5a5a; }
  .feedback-list { list-style:none; padding:0; margin:0; }
  .feedback-list li { font-size:0.82rem; color:#cbd5e1; line-height:1.7; padding-left:14px; position:relative; }
  .feedback-list li::before { content:''; position:absolute; left:0; top:9px; width:5px; height:5px; border-radius:50%; background:var(--primary); }
  .feedback-card.b-grade .feedback-list li::before { background:#ffd700; }
  .feedback-card.c-grade .feedback-list li::before { background:#ff5a5a; }
  .feedback-card.a-grade .feedback-list li::before { background:var(--accent); }
  .feedback-list li + li { margin-top:3px; }
  .feedback-score-tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:0.72rem; font-weight:600; margin-left:auto; }
  .feedback-score-tag.s { background:rgba(0,212,170,0.15); color:var(--primary); }
  .feedback-score-tag.a { background:rgba(0,168,255,0.12); color:var(--accent); }
  .feedback-score-tag.b { background:rgba(255,200,50,0.12); color:#ffd700; }
  .feedback-score-tag.c { background:rgba(255,90,90,0.12); color:#ff5a5a; }

  /* 输入区 */
  .input-area {
    display: flex; gap: 10px;
  }
  .input-area input {
    flex: 1; padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; color: var(--text);
    font-size: 0.9rem; outline: none; font-family: inherit;
    transition: all 0.3s;
  }
  .input-area input::placeholder { color: #475569; }
  .input-area input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-glow);
    background: rgba(255,255,255,0.06);
  }
  .input-area input:disabled { opacity: 0.3; }

  .btn {
    padding: 12px 22px; border-radius: 14px;
    border: none; font-weight: 600; font-size: 0.88rem;
    cursor: pointer; transition: all 0.25s;
    font-family: inherit; letter-spacing: 1px;
    position: relative; overflow: hidden;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #00a896);
    color: #000;
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px var(--primary-glow); }
  .btn-primary:disabled { background: #1e293b; color: #475569; cursor: not-allowed; box-shadow: none; }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

  .start-wrap { text-align: center; margin-top: 14px; }
  .start-wrap .btn { padding: 13px 44px; font-size: 1rem; }
  .start-wrap .btn-pulse {
    animation: btnGlow 2.2s ease-in-out infinite;
  }
  @keyframes btnGlow {
    0%,100% { box-shadow: 0 0 15px var(--primary-glow); }
    50% { box-shadow: 0 0 35px var(--primary-glow); }
  }

  /* ========== 报告 ========== */
  #reportScene { display: none; }
  .score-ring-wrap {
    display: flex; justify-content: center; padding: 20px 0 10px;
  }
  .score-ring {
    width: 150px; height: 150px; border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
  }
  .score-ring::before {
    content: ''; position: absolute; inset: -5px;
    border-radius: 50%; padding: 5px;
    background: conic-gradient(var(--primary), var(--accent), #a78bfa, var(--primary));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: spinRing 5s linear infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .score-num { font-size: 2.8rem; font-weight: 800; line-height: 1; }
  .score-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }

  .dim-bars { padding: 0 4px; }
  .dim-item {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .dim-icon { font-size: 1.1rem; width: 24px; text-align: center; }
  .dim-name { font-size: 0.78rem; color: var(--text-dim); width: 64px; }
  .dim-track {
    flex: 1; height: 7px; background: rgba(255,255,255,0.05);
    border-radius: 4px; overflow: hidden;
  }
  .dim-fill {
    height: 100%; border-radius: 4px;
    width: 0; transition: width 1.4s cubic-bezier(.22,.61,.36,1);
  }
  .dim-fill.l { background: linear-gradient(90deg, var(--primary), #00a896); }
  .dim-fill.p { background: linear-gradient(90deg, var(--accent), #0066ff); }
  .dim-fill.a { background: linear-gradient(90deg, #a78bfa, #7c3aed); }
  .dim-fill.c { background: linear-gradient(90deg, var(--gold), #f59e0b); }
  .dim-val { font-size: 0.8rem; font-weight: 700; width: 32px; text-align: right; }

  .advice-box {
    background: rgba(255,255,255,0.03);
    border-radius: 14px; padding: 14px 16px;
    margin-top: 14px; font-size: 0.82rem;
    color: var(--text-dim); line-height: 1.7;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .action-btns {
    display: flex; gap: 10px; justify-content: center; margin-top: 18px;
  }

  /* 撒花 */
  .confetti {
    position: fixed; z-index: 9999; pointer-events: none;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* Toast */
  .toast {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,212,170,0.95); color: #000;
    padding: 10px 24px; border-radius: 40px;
    font-size: 0.82rem; font-weight: 600; z-index: 300;
    animation: toastIn 0.4s cubic-bezier(.34,1.56,.64,1), toastOut 0.3s 2s ease forwards;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-16px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes toastOut {
    to { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }

  footer {
    text-align: center; font-size: 0.65rem;
    color: #1e293b; padding: 20px 0;
    letter-spacing: 1px;
  }

  @media (max-width: 480px) {
    .intro-year { font-size: 2.4rem; }
    .role-grid { grid-template-columns: 1fr; }
    .topbar h1 { font-size: 1.3rem; }
    .score-num { font-size: 2.2rem; }
    .score-ring { width: 120px; height: 120px; }
  }
</style>
</head>
<body>

<!-- 粒子雨背景 -->
<div class="rain" id="rain"></div>

<!-- ========== 开场动画 ========== -->
<div id="introScreen">
  <div class="intro-year">公元2030年</div>
  <div class="intro-line typing" id="introLine"></div>
  <button class="intro-btn" id="introBtn" onclick="enterMain()">接受邀请</button>
</div>

<!-- ========== 主内容 ========== -->
<div class="wrap" id="mainWrap">

  <div class="topbar">
    <div class="chapter-tag" id="chapterTag">序幕 · 觉醒</div>
    <h1>AI面试模拟器</h1>
    <div class="sub">腾讯青科实训营 · 未来HR挑战</div>
  </div>

  <!-- 角色选择 -->
  <div class="scene">
    <div class="scene-title"><div class="dot"></div>选择你的角色</div>
    <div class="role-grid" id="roleGrid">
      <div class="role-card" data-job="pm" onclick="selectRole(this,'pm')">
        <span class="emoji">📊</span>
        <div class="name">产品经理</div>
        <div class="desc">洞察需求 · 驱动迭代</div>
      </div>
      <div class="role-card" data-job="hr" onclick="selectRole(this,'hr')">
        <span class="emoji">👥</span>
        <div class="name">HR 专员</div>
        <div class="desc">识人育人 · 组织效能</div>
      </div>
      <div class="role-card" data-job="dev" onclick="selectRole(this,'dev')">
        <span class="emoji">💻</span>
        <div class="name">软件开发</div>
        <div class="desc">代码筑基 · 技术破局</div>
      </div>
    </div>
    <div id="roleHint" style="text-align:center; font-size:0.78rem; color:var(--text-dim); margin-top:12px;">
      点击上方角色，开始你的面试之旅
    </div>
  </div>

  <!-- 面试间 -->
  <div class="scene">
    <div class="interview-top">
      <div class="left">💬 面试间</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="step-dots" id="stepDots">
          <div class="step-dot" id="sd1">1</div>
          <div class="step-line" id="sl1"></div>
          <div class="step-dot" id="sd2">2</div>
          <div class="step-line" id="sl2"></div>
          <div class="step-dot" id="sd3">3</div>
        </div>

function simulateEval(jobKey, qIdx, ans) {
  let score = 60;
  const len = ans.trim().length;
  if (len > 120) score += 20;
  else if (len > 80) score += 14;
  else if (len > 50) score += 8;
  else if (len > 30) score += 4;
  else if (len < 10) score -= 24;
  else if (len < 20) score -= 10;
  const kw = {
    pm: ['用户','数据','优先级','迭代','需求','mvp','转化','痛点','场景','体验','流程','画像','漏斗','留存','北极星'],
    hr: ['业务','沟通','共情','ai','数据','文化','冲突','人才','组织','战略','绩效','激励','梯队','离职','OKR'],
    dev: ['算法','性能','重构','测试','架构','debug','协作','扩展','维护','优化','缓存','并发','安全','接口','复杂度']
  };
  let mc = 0;
  const jobKw = kw[jobKey]||[];
  jobKw.forEach(k => { if(ans.toLowerCase().includes(k.toLowerCase())) mc++; });
  score += Math.min(26, mc*3);
  if (/首先|第一步|1\.|一、/.test(ans)) score += 3;
  if (/其次|然后|第二步|2\.|二、/.test(ans)) score += 3;
  if (/最后|总结|综上所述|总之/.test(ans)) score += 3;
  if (/\d+%|\d+个|\d+万|\d+亿|\d+ms|\d+s/.test(ans)) score += 3;
  score = Math.min(98, Math.max(25, Math.round(score)));
  const fb = generateFeedback(score, jobKey, qIdx, ans, mc, len);
  return {
    score,
    comment: fb.summary,
    grade: fb.grade,
    summary: fb.summary,
    highlights: fb.highlights,
    weaknesses: fb.weaknesses,
    tips: fb.tips,
    dims: {
      logic: Math.min(98,Math.max(30,60+(score-60)*0.45+(Math.random()*8-4))),
      profession: Math.min(98,Math.max(30,60+(score-60)*0.5+(Math.random()*6-3))),
      adaptability: Math.min(98,Math.max(30,55+(score-55)*0.35+(Math.random()*10-5))),
      communication: Math.min(98,Math.max(30,65+(score-65)*0.3+(Math.random()*8-4)))
    }
  };
}

function generateFeedback(score, jobKey, qIdx, ans, kwCount, len) {
  const grade = score>=88?'S':score>=75?'A':score>=60?'B':'C';
  const pools = {
    S: {
      summary: ['回答非常出色，思路清晰且具备深度！','表现惊艳，展现了扎实的专业功底。','逻辑严密，论证充分，令人印象深刻。','作为面试官，我对这个回答很满意。'],
      highlights: ['观点鲜明，直击问题核心','结构化表达优秀，层次分明','结合了实际场景，具有很强的落地性','用词精准，体现了专业素养','有数据或案例支撑，说服力很强'],
      weaknesses: ['几乎找不到明显不足，如果硬要说，可以在结尾补充一个反向思考。'],
      tips: ['继续保持这种思考深度，面试实战中也这么发挥即可。','你已经具备了该岗位的优秀潜质，自信表达就好。']
    },
    A: {
      summary: ['整体不错，抓住了核心要点。','回答有亮点，逻辑也基本通顺。','展现了一定的专业积累，继续打磨会更出彩！','是个合格的回答，距离优秀只差一步。'],
      highlights: ['核心观点表达清楚','有一定的结构化意识','关键词匹配度良好','对问题理解没有偏差'],
      weaknesses: ['细节展开不够充分','缺少具体案例或数据支撑','结尾收束略显仓促','部分论点之间衔接可以更自然'],
      tips: ['尝试用"STAR法则"组织回答','多补充1-2个量化指标或真实案例','在结尾做30字以内的精炼总结','回答前先花5秒在脑中画个思维导图']
    },
    B: {
      summary: ['回答基本及格，但亮点不足。','思路有了雏形，还需要进一步打磨。','能听懂问题，但深度有待加强。','中规中矩，缺少让面试官记住的点。'],
      highlights: ['对问题有基本的理解','提到了少量相关概念','态度认真，有尝试回答'],
      weaknesses: ['内容较为单薄，缺乏展开','逻辑链条不够完整','缺少岗位关键词','几乎没有任何案例或数据','表达有些口语化，不够专业'],
      tips: ['回答前先花10秒在脑中列个提纲','每个观点尽量配一个实例','主动使用岗位专业术语','把"我觉得"换成"基于...分析"','尝试用"首先-其次-最后"三段式']
    },
    C: {
      summary: ['回答比较薄弱，需要大幅加强。','目前的表现距离岗位要求还有差距。','建议系统学习后再来挑战。','这次发挥不太理想，别灰心，复盘后再战。'],
      highlights: ['至少尝试了回答问题','没有回避问题，态度可嘉'],
      weaknesses: ['内容过于简短，信息密度极低','完全缺少结构化思考','没有体现岗位认知','回答偏离问题核心','缺乏任何专业术语或案例'],
      tips: ['先学习该岗位常见的面试题库','掌握STAR/金字塔等表达框架','多看优秀回答范例并模仿','下次回答前先深呼吸，理清思路','从"是什么-为什么-怎么做"三层展开']
    }
  };
  const jobTips = {
    pm: {
      S: ['可以尝试提及A/B测试或埋点方案来加分。'],
      A: ['补充用户画像或使用路径图会更出彩。',' Mention一下MVP验证思路。'],
      B: ['多从"用户需求→产品方案→数据验证"三段论来组织。','试着用具体的产品案例来论证。'],
      C: ['先理解产品经理的核心能力是"发现问题+设计解决方案+推动落地"。']
    },
    hr: {
      S: ['如果能结合劳动法规或组织发展理论会更专业。'],
      A: ['多使用HR专业术语，如人才盘点、胜任力模型等。','结合实际业务场景给出方案。'],
      B: ['HR回答要有"人"味，也要有"数"据。','从组织、团队、个人三个层面展开。'],
      C: ['HR的核心是理解业务+赋能人才，先建立这个认知框架。']
    },
    dev: {
      S: ['提及复杂度分析或性能瓶颈排查过程会是亮点。'],
      A: ['补充技术选型理由和trade-off思考。','给出伪代码或架构图描述。'],
      B: ['技术回答要有"what-why-how"三层结构。','多提测试、监控、容灾等工程化意识。'],
      C: ['先掌握技术问题的标准回答模板，再逐步加入个人理解。']
    }
  };
  const pick = (arr, n=1) => {
    const shuffled = arr.slice().sort(()=>Math.random()-0.5);
    return shuffled.slice(0, Math.min(n, shuffled.length));
  };
  const g = pools[grade];
  const jt = (jobTips[jobKey]||{})[grade] || [];
  const summary = pick(g.summary, 1)[0];
  let highlights = pick(g.highlights, grade==='S'?2:grade==='A'?2:1);
  let weaknesses = pick(g.weaknesses, grade==='C'?3:grade==='B'?2:1);
  let tips = pick(g.tips, 2);
  if (jt.length) tips = tips.concat(pick(jt, 1));
  if (len < 25 && grade !== 'C') {
    weaknesses.push('回答篇幅过短，难以充分展示思考深度');
    tips.push('建议每题至少写50字以上，给面试官足够的信息量');
  }
  if (kwCount >= 5 && grade !== 'S') {
    highlights.push('专业关键词使用丰富，体现了岗位敏感度');
  }
  if (kwCount <= 1 && grade !== 'C') {
    weaknesses.push('岗位关键词使用太少，建议多融入专业术语');
  }
  if (!/\d/.test(ans) && score < 85) {
    weaknesses.push('缺少量化表达，"提升很多"不如"提升35%"有说服力');
    tips.push('尽可能用数字、百分比、时间周期来支撑观点');
  }
  return { grade, summary, highlights, weaknesses, tips };

function renderFeedbackCard(ev) {

      <div class="feedback-section-title">✅ 亮点</div>

    </div>
    <div class="feedback-section">
      <div class="feedback-section-title">⚠️ 不足</div>
      <ul class="feedback-list">${ev.weaknesses.map(w=>`<li>${w}</li>`).join('')}</ul>
    </div>
    <div class="feedback-section">
      <div class="feedback-section-title" style="color:var(--accent)">💡 建议</div>
      <ul class="feedback-list">${ev.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
  `;
  chatBox.appendChild(card);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function animateNum(el, from, to, dur) {
  const t0 = performance.now();
  function tick(t) {
    const p = Math.min((t-t0)/dur, 1);
    const e = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(from + (to-from)*e);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

async function submitAnswer() {
  if (!currentJob) { await typeMsg('ai','请先选择一个角色再开始面试。'); return; }
  if (currentStep < 1 || currentStep > questionsList.length) return;
  const ans = answerInput.value.trim();
  if (!ans) { await typeMsg('ai','🤔 请写一点回答再提交吧，简短也可以～'); return; }
  userAnswers.push(ans);
  await typeMsg('user', ans);
  answerInput.value = '';
  sendBtn.disabled = true; answerInput.disabled = true;

  const th = showThinking();
  await new Promise(r => setTimeout(r, 1000+Math.random()*500));
  removeThinking(th);

  const qIdx = currentStep - 1;
  const ev = simulateEval(currentJob, qIdx, ans);
  scoresPerAnswer.push(ev.score);
  dimensionScores.logic += ev.dims.logic;
  dimensionScores.profession += ev.dims.profession;
  dimensionScores.adaptability += ev.dims.adaptability;
  dimensionScores.communication += ev.dims.communication;

  aiFeedbacks.push(`第${currentStep}题: ${ev.summary} (${ev.score}分)`);
  await typeMsg('ai', `第${currentStep}题回答完毕，正在生成点评...`);
  renderFeedbackCard(ev);

  if (currentStep === questionsList.length) {
    currentStep = 4;
    sendBtn.disabled = true; answerInput.disabled = true;
    updateDots();
    document.getElementById('chapterTag').textContent = '终章 · 尘埃落定';
    generateReport();
  } else {
    currentStep++;
    updateDots();
    document.getElementById('chapterTag').textContent = currentStep === 2 ? '第二章 · 深入虎穴' : '最终章 · 终局试炼';
    const transitions = {
      2: '面试官翻过一页简历，微微颔首。看来对你的表现还算满意——但难题在后头。',
      3: '面试官放下手中的笔，身体微微前倾。语气变得比刚才郑重了几分：'
    };
    const tr = transitions[currentStep];
    if (tr) await typeMsg('ai', tr);
    await typeMsg('ai', `🗣️ 第${currentStep}题：${questionsList[currentStep-1]}`);
    sendBtn.disabled = false; answerInput.disabled = false;
    answerInput.focus();
  }
}

function generateReport() {
  const avgL = dimensionScores.logic/3, avgP = dimensionScores.profession/3;
  const avgA = dimensionScores.adaptability/3, avgC = dimensionScores.communication/3;
  const total = Math.round(scoresPerAnswer.reduce((a,b)=>a+b,0)/scoresPerAnswer.length);

  reportScene.style.display = 'block';
  document.getElementById('reportBody').innerHTML = `
    <div class="score-ring-wrap">
      <div class="score-ring">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label">${jobMap[currentJob].icon} ${jobMap[currentJob].name}</div>
      </div>
    </div>
    <div style="text-align:center; font-size:0.8rem; color:var(--text-dim); margin-bottom:14px;">
      ${total>=80?'🌟 表现优秀，有潜力！':total>=65?'👍 不错，继续提升~':'📚 再加强实战与思考'}
    </div>
    <div style="max-width:300px; margin:0 auto 14px;">
      <canvas id="radarCanvas" style="width:100%; height:auto; display:block;"></canvas>
    </div>
    <div class="dim-bars">
      <div class="dim-item"><span class="dim-icon">🧠</span><span class="dim-name">逻辑表达</span><div class="dim-track"><div class="dim-fill l" id="bf-l"></div></div><span class="dim-val" id="bv-l">0</span></div>
      <div class="dim-item"><span class="dim-icon">🎯</span><span class="dim-name">专业匹配</span><div class="dim-track"><div class="dim-fill p" id="bf-p"></div></div><span class="dim-val" id="bv-p">0</span></div>
      <div class="dim-item"><span class="dim-icon">⚡</span><span class="dim-name">应变能力</span><div class="dim-track"><div class="dim-fill a" id="bf-a"></div></div><span class="dim-val" id="bv-a">0</span></div>
      <div class="dim-item"><span class="dim-icon">🗣️</span><span class="dim-name">沟通技巧</span><div class="dim-track"><div class="dim-fill c" id="bf-c"></div></div><span class="dim-val" id="bv-c">0</span></div>
    </div>
    <div class="advice-box">
      💡 面试官建议：${total>=80?'多做实战项目，拓展行业视野。':total>=65?'回答时多引用STAR法则，量化成果。':'先梳理岗位核心能力，用真实案例打磨表达。'}
    </div>
  `;
  reportScene.scrollIntoView({ behavior:'smooth' });

  setTimeout(() => { const el = document.getElementById('scoreNum'); if(el) animateNum(el,0,total,1500); }, 200);
  setTimeout(() => {
    const map = { l:avgL, p:avgP, a:avgA, c:avgC };
    Object.keys(map).forEach(k => {
      const v = Math.round(map[k]);
      const bar = document.getElementById('bf-'+k);
      const val = document.getElementById('bv-'+k);
      if(bar) bar.style.width = v+'%';
      if(val) animateNum(val,0,v,1200);
    });
  }, 400);

  setTimeout(() => {
    const canvas = document.getElementById('radarCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const size = 280;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    ctx.scale(dpr, dpr);
    
    const cx = size/2, cy = size/2, r = 100;
    const labels = ['逻辑表达','专业匹配','应变能力','沟通技巧'];
    const values = [avgL, avgP, avgA, avgC];
    const N = labels.length;
    
    // 绘制动画
    let animStart = null;
    const duration = 1400;
    function drawRadar(ts) {
      if (!animStart) animStart = ts;
      const progress = Math.min(1, (ts - animStart) / duration);
      const ease = 1 - Math.pow(1 - progress, 3); // easeOutCubic
      
      ctx.clearRect(0, 0, size, size);
      
      // 背景网格
      for (let level = 1; level <= 5; level++) {
        ctx.beginPath();
        const lr = r * level / 5;
        for (let i = 0; i < N; i++) {
          const ang = -Math.PI/2 + i * 2*Math.PI/N;
          const px = cx + lr * Math.cos(ang);
          const py = cy + lr * Math.sin(ang);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.stroke();
      }
      
      // 轴线
      for (let i = 0; i < N; i++) {
        const ang = -Math.PI/2 + i * 2*Math.PI/N;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(ang), cy + r * Math.sin(ang));
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.stroke();
      }
      
      // 数据区域
      const animVals = values.map(v => v * ease);
      ctx.beginPath();
      for (let i = 0; i < N; i++) {
        const ang = -Math.PI/2 + i * 2*Math.PI/N;
        const vr = r * animVals[i] / 100;
        const px = cx + vr * Math.cos(ang);
        const py = cy + vr * Math.sin(ang);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,212,170,0.12)';
      ctx.fill();
      ctx.strokeStyle = '#00d4aa';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // 数据点
      for (let i = 0; i < N; i++) {
        const ang = -Math.PI/2 + i * 2*Math.PI/N;
        const vr = r * animVals[i] / 100;
        const px = cx + vr * Math.cos(ang);
        const py = cy + vr * Math.sin(ang);
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, 2*Math.PI);
        ctx.fillStyle = '#00d4aa';
        ctx.fill();
        ctx.strokeStyle = '#05070a';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      
      // 刻度标签(隐藏刻度数字，只显示轴标签)
      // 标签
      ctx.fillStyle = '#64748b';
      ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 0; i < N; i++) {
        const ang = -Math.PI/2 + i * 2*Math.PI/N;
        const lx = cx + (r + 28) * Math.cos(ang);
        const ly = cy + (r + 28) * Math.sin(ang);
        ctx.fillText(labels[i], lx, ly);
      }
      
      // 分数标注
      for (let i = 0; i < N; i++) {
        const ang = -Math.PI/2 + i * 2*Math.PI/N;
        const vr = r * animVals[i] / 100;
        const px = cx + vr * Math.cos(ang);
        const py = cy + vr * Math.sin(ang);
        ctx.fillStyle = '#00d4aa';
        ctx.font = 'bold 10px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillText(Math.round(animVals[i]), px, py - 14);
      }
      
      if (progress < 1) {
        requestAnimationFrame(drawRadar);
      }
    }
    requestAnimationFrame(drawRadar);
  }, 500);

  if (total >= 75) setTimeout(confetti, 700);
  toast('✨ 面试报告生成完毕！');
  
  // 结局叙事
  setTimeout(() => {
    if (chatBox.lastElementChild?.classList?.contains('feedback-card')) return;
    const ending = document.createElement('div');
    ending.className = 'msg ai';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.style.cssText = 'background:linear-gradient(135deg,rgba(0,212,170,0.12),rgba(0,168,255,0.08));border:1px solid rgba(0,212,170,0.2);';
    const conclusions = {
      high: '「面试结束了。\n\n坦白说，你的表现超出了我的预期。思路清楚，表达流畅，这在应届生中并不多见。\n\n记住这份自信，带着它走进真正的那间会议室——你会让面试官记住你的名字。」\n\n—— AI面试官 · 最终评语',
      mid: '「还不错。\n\n你有基础，也知道自己在说什么。接下来需要做的，就是把碎片化的想法组织起来，把直觉变成方法论。\n\n下一次，我希望听到你用 STAR 法则重构每一个回答。」\n\n—— AI面试官 · 最终评语',
      low: '「这次发挥的确不太理想，但别灰心。\n\n面试是一场可以反复练习的技能，不是天赋。每一次失败都是下一次成功的垫脚石。\n\n回去复盘一下今天的题目，一周后再来找我。我能看到你的潜力。」\n\n—— AI面试官 · 最终评语'
    };
    const key = total>=80?'high':total>=65?'mid':'low';
    bubble.innerHTML = conclusions[key].replace(/\n/g, '<br>');
    ending.appendChild(bubble);
    chatBox.appendChild(ending);
    chatBox.scrollTop = chatBox.scrollHeight;
  }, 1800);
}

async function startInterview() {
  if (!currentJob) { await typeMsg('ai','⚠️ 请先选择你的角色~'); return; }
  if (currentStep === 4) resetAll();
  if (currentStep > 0 && currentStep <= 3) { await typeMsg('ai','⏳ 面试已在进行中，请继续回答。'); return; }
  clearChat(false);
  currentStep = 1;
  userAnswers=[]; aiFeedbacks=[]; scoresPerAnswer=[];
  dimensionScores = { logic:0, profession:0, adaptability:0, communication:0 };
  questionsList = [...questionBank[currentJob].questions];
  updateDots();
  document.getElementById('chapterTag').textContent = '第一章 · 锋芒初现';
  await typeMsg('ai', `🎤 面试官翻阅着你的简历，抬起头，目光透过屏幕直视着你...`);
  setTimeout(async () => {
    await typeMsg('ai', `第1题：${questionsList[0]}`);
  }, 600);
  sendBtn.disabled = false; answerInput.disabled = false;
  answerInput.focus();
  reportScene.style.display = 'none';
}

function resetAll() {
  currentStep = 0; currentJob = null;
  sendBtn.disabled = true; answerInput.disabled = true;
  clearChat(true); updateDots();
  reportScene.style.display = 'none';
  document.getElementById('chapterTag').textContent = '序幕 · 觉醒';
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  roleHint.textContent = '点击上方角色，开始你的面试之旅';
  startBtn.style.display = 'inline-block';
}

answerInput.addEventListener('keypress', e => {
  if (e.key === 'Enter' && !sendBtn.disabled && !answerInput.disabled) submitAnswer();
});

async function shareReport() {
  const el = document.getElementById('reportBody');
  if (!el) return;
  try {
    // 复制样式到内联，确保SVG渲染正确
    const styleContent = document.querySelector('style').textContent;
    const html = `<style>${styleContent} body{margin:0;background:#0c1020} .score-ring-wrap{transform:none!important}</style><div style="background:#0c1020;padding:16px;width:360px">${el.innerHTML}</div>`;
    const data = `<svg xmlns="http://www.w3.org/2000/svg" width="360" height="${el.offsetHeight + 32}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">${html}</div></foreignObject></svg>`;
    const img = new Image();
    const svg = new Blob([data], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svg);
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = 720;
      canvas.height = (el.offsetHeight + 32) * 2;
      const ctx2 = canvas.getContext('2d');
      ctx2.fillStyle = '#0c1020';
      ctx2.fillRect(0, 0, canvas.width, canvas.height);
      ctx2.drawImage(img, 0, 0);
      const a = document.createElement('a');
      a.download = `面试报告_${(jobMap[currentJob]||{name:'AI'}).name}.png`;
      a.href = canvas.toDataURL();
      a.click();
      URL.revokeObjectURL(url);
      toast('📸 截图已保存！');
    };
    img.onerror = function() { alert('截图生成失败，请尝试截图后分享'); };
    img.src = url;
  } catch(e) { alert('截图生成失败'); }
}
